<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>2020 Election Ratios</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/dark/main.css" />
    <script src="https://js.arcgis.com/4.28/"></script>

    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>

    <script>
      require(["esri/Map", "esri/views/MapView", "esri/layers/FeatureLayer", "esri/widgets/Legend"], (
        Map,
        MapView,
        FeatureLayer,
        Legend
      ) => {
        const defaultSym = {
          type: "simple-marker", // autocasts as new SimpleMarkerSymbol()
          color: [0, 0, 0, 0],
          outline: {
            // autocasts as new SimpleLineSymbol()
            color: "Blue",
            width: 1
          }
        };

        /*****************************************************************
         * Set a size visual variable on the renderer. Size visual variables
         * create continuous ramps that map low data values to small icons
         * and high data values to large icons. Features
         * with data values in between the min and max data values are assigned
         * a size proportionally between the min and max sizes specified in
         * `minSize` and `maxSize` or `stops`.
         *****************************************************************/

        const renderer = {
          type: "simple", // autocasts as new SimpleRenderer()
          symbol: defaultSym,
          visualVariables: [
            {
              type: "size",
              field: "dem_2020",
              normalizationField: "rep_2020",
              legendOptions: {
                title: "Democrat to Republican Ratio"
              },
              stops: [
                {
                  value: 0.1,
                  size: 0.1,
                  label: "1:10",
                },
                {
                  value: 1,
                  size: 1,
                  label: "1:1",
                },
                {
                  value: 10,
                  size: 10,
                  label: "10:1",
                }
              ]
            }
          ]
        };

        const povLayer = new FeatureLayer({
          url:
            "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/ArcGIS/rest/services/20_years_of_US_presidential_elections_by_county/FeatureServer/0",
          renderer: renderer,
          title: "Presidential Votes in 2020 by County",
          popupTemplate: {
            // autocasts as new PopupTemplate()
            title: "{county}, {state}",
            content: "In 2020, {county}, {state} cast {dem_2020} votes for Joe Biden and {rep_2020} for Donald Trump.",
            fieldInfos: [
              {
                fieldName: "dem_2020",
                format: {
                  digitSeparator: true,
                  places: 0
                }
              },
              {
                fieldName: "rep_2020",
                format: {
                  digitSeparator: true,
                  places: 0
                }
              },
            ]
          }
        });

        const map = new Map({
          basemap: "dark-gray-vector",
          layers: [povLayer]
        });

        const view = new MapView({
          container: "viewDiv",
          map: map,
          center: [-98.583333, 39.833333],
          zoom: 3.5
        });

        /******************************************************************
         *
         * Add layers to layerInfos on the legend
         *
         ******************************************************************/

        view.ui.add(
          new Legend({
            view: view
          }),
          "top-right"
        );
      });
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
  </body>
</html>
